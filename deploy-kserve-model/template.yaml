apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deploy-kserve-model
  title: Deploy Model (KServe)
  description: Deploy a model using GitOps and Flux
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Model Configuration
      required:
        - modelName
        - modelUri
        - namespace
      properties:
        modelName:
          type: string
          title: Model Name
        modelUri:
          type: string
          title: Model URI
        namespace:
          type: string
          title: Namespace
          default: kubeflow-user-example-com

  steps:
    - id: generate
      name: Generate KServe manifest
      action: fetch:template
      input:
        url: ./skeleton
        values:
          modelName: ${{ parameters.modelName }}
          modelUri: ${{ parameters.modelUri }}
          namespace: ${{ parameters.namespace }}

    - id: pr
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=cymile&repo=model-deployments
        branchName: deploy-${{ parameters.modelName }}
        title: Deploy model ${{ parameters.modelName }}
        description: |
          Deploy model via Backstage

          - Model: ${{ parameters.modelName }}
          - URI: ${{ parameters.modelUri }}
          - Namespace: ${{ parameters.namespace }}
        targetBranchName: main
        sourcePath: .
        targetPath: apps/models/dev/${{ parameters.modelName }}
        commitMessage: Add model ${{ parameters.modelName }} manifest

  output:
    links:
      - title: Pull Request
        url: ${{ steps.pr.output.remoteUrl }}